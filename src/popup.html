<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="header">
    <div class="brand-group">
      <span class="brand-name">WhatsApp+</span>
    </div>
    <button id="changeShortcut" title="Configure Shortcut" class="icon-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#128c7e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <button id="toggleAllBtn" class="primary-btn">Toggle All Privacy</button>
  <div class="shortcut-container" id="shortcutDisplayContainer"></div>
  <div class="divider"></div>

  <h2 class="section-title">FIELD CATEGORIES</h2>
  <div class="settings-card">
    <div class="row">
      <span class="label">Profile Pictures</span>
      <label class="switch"><input type="checkbox" id="profileBlur"><span class="slider"></span></label>
    </div>
    <div class="row">
      <span class="label">Contact/Group Names</span>
      <label class="switch"><input type="checkbox" id="nameBlur"><span class="slider"></span></label>
    </div>
    <div class="row">
      <div class="label-group">
        <span class="label">Inside Chat Messages</span>
      </div>
      <label class="switch"><input type="checkbox" id="chatBlur"><span class="slider"></span></label>
    </div>
  </div>

  <script src="/scripts/popup.js"></script>
</body>
</html>
